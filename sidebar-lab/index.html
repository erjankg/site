<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>Sidebar-Lab · песочница hover-анимаций сайдбара</title>
  <link rel="stylesheet" href="sidebar-lab.css">
</head>
<body>

  <header class="sl-head">
    <h1 class="sl-title">
      ✦ Sidebar-Lab
      <small>песочница hover-анимаций сайдбара · минимал-премиум · не индексируется, не на сайте</small>
    </h1>
    <div class="sl-controls">
      <label class="sl-ctrl">
        Скорость
        <input id="slSpeed" type="range" min="0.4" max="2" step="0.1" value="1">
        <span id="slSpeedVal">1.0×</span>
      </label>
      <div class="sl-ctrl">
        Акцент
        <div class="sl-swatches" id="slSwatches">
          <span class="sl-sw active" data-accent="11,196,227"  style="background:#0BC4E3" title="Циан (сайт)"></span>
          <span class="sl-sw"        data-accent="200,155,60"  style="background:#C89B3C" title="Золото"></span>
          <span class="sl-sw"        data-accent="180,140,255" style="background:#B48CFF" title="Фиолет"></span>
          <span class="sl-sw"        data-accent="46,204,113"  style="background:#2ECC71" title="Зелёный"></span>
          <span class="sl-sw"        data-accent="231,76,60"   style="background:#E74C3C" title="Красный"></span>
          <span class="sl-sw"        data-accent="255,99,164"  style="background:#FF63A4" title="Розовый"></span>
          <span class="sl-sw"        data-accent="230,126,34"  style="background:#E67E22" title="Оранжевый"></span>
          <span class="sl-sw"        data-accent="225,240,250" style="background:#E1F0FA" title="Серебро"></span>
        </div>
        <label class="sl-custom" title="Свой цвет">
          <input type="color" id="slCustom" value="#0bc4e3">
        </label>
      </div>
      <label class="sl-ctrl sl-bg-toggle">
        <input type="checkbox" id="slDim"> Затемнить фон
      </label>
    </div>
  </header>

  <main class="sl-wrap" id="slWrap"></main>

  <script src="sidebar-lab.js"></script>
</body>
</html>
