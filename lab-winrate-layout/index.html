<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Winrate Layout Lab — варианты раскладки таблицы винрейтов</title>
<style>
  :root{ --bg:#0a0f16; --panel:#0d1b2a; --line:rgba(255,255,255,.1); --accent:#0bc4e3; --sel:#2ecc71; --text:#e8eef4; --muted:rgba(255,255,255,.55); }
  *{box-sizing:border-box;}
  body{ margin:0; background:radial-gradient(1000px 500px at 70% -10%,#112436,var(--bg) 60%);
        color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; padding:22px; }
  h1{margin:0 0 6px; font-size:21px;}
  .sub{color:var(--muted); font-size:13px; margin:0 0 16px; max-width:820px; line-height:1.6;}
  .switch{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px;}
  .switch button{background:rgba(255,255,255,.05); border:1px solid var(--line); color:rgba(255,255,255,.85);
    font-size:13px; font-weight:700; padding:8px 14px; border-radius:10px; cursor:pointer;}
  .switch button.on{background:rgba(11,196,227,.16); border-color:rgba(11,196,227,.6); color:var(--accent);}
  .vdesc{color:var(--muted); font-size:12.5px; margin:0 0 12px; min-height:18px;}
  .vdesc b{color:var(--sel);}

  .screen{ height:78vh; min-height:520px; border:1px solid var(--line); border-radius:14px; overflow:hidden;
           background:linear-gradient(180deg,var(--panel),#0b1622); box-shadow:0 20px 60px rgba(0,0,0,.5); display:flex; flex-direction:column;}

  .hdr{display:flex; align-items:center; gap:8px; padding:12px 16px; border-bottom:1px solid var(--line);}
  .hdr .t{font-size:16px; font-weight:800;}
  .hdr .upd{font-size:11px; color:var(--muted);}
  .hdr .ic{background:rgba(255,255,255,.06); border:1px solid var(--line); color:rgba(255,255,255,.8); width:30px; height:30px; border-radius:8px; cursor:pointer; font-size:14px;}

  .chips{display:flex; gap:6px; flex-wrap:wrap;}
  .chip{padding:6px 12px; border-radius:18px; border:1.5px solid var(--line); background:none; color:rgba(255,255,255,.6); font-size:12px; font-weight:700; cursor:pointer; white-space:nowrap;}
  .chip.on{background:rgba(46,204,113,.22); border-color:var(--sel); color:var(--sel);}
  .rchip{width:34px; height:30px; display:flex; align-items:center; justify-content:center; border-radius:16px; border:1.5px solid var(--line); background:none; color:rgba(255,255,255,.7); font-size:11px; font-weight:700; cursor:pointer;}
  .rchip.on{border-color:var(--accent); color:var(--accent); background:rgba(11,196,227,.12);}

  .tbl{flex:1; min-height:0; overflow-y:auto; padding:6px 10px 10px;}
  .thead{display:flex; align-items:center; gap:6px; padding:6px 8px; font-size:11px; font-weight:700; text-transform:uppercase; color:var(--muted); border-bottom:1px solid var(--line);}
  .wrow{display:flex; align-items:center; gap:6px; padding:6px 8px; border-radius:8px; border-bottom:1px solid rgba(255,255,255,.04);}
  .wrow:nth-child(even){background:rgba(255,255,255,.015);}
  .c-n{width:28px; text-align:center; color:rgba(255,255,255,.35); font-size:12px;}
  .c-c{flex:1; min-width:0; display:flex; align-items:center; gap:8px;}
  .c-c img{width:32px; height:32px; border-radius:7px; background:linear-gradient(135deg,#1c3350,#0c1a2a);}
  .c-c span{font-size:13px; font-weight:700;}
  .c-wr{width:60px; text-align:center; font-weight:900; font-size:13px;}
  .c-pr,.c-br{width:54px; text-align:center; font-size:13px; color:rgba(255,255,255,.7);}
  .tbl.dense .wrow{padding:3px 8px;} .tbl.dense .c-c img{width:24px; height:24px;} .tbl.dense .c-c span{font-size:12px;}
  .cards{display:flex; flex-wrap:wrap; gap:10px; padding:12px;}
  .card{width:124px; background:rgba(255,255,255,.04); border:1px solid var(--line); border-radius:12px; padding:10px; text-align:center;}
  .card img{width:50px; height:50px; border-radius:10px; background:linear-gradient(135deg,#1c3350,#0c1a2a);}

  .sidewrap{display:flex; height:100%; min-height:0;}
  .sidep{width:150px; flex:0 0 auto; border-right:1px solid var(--line); padding:14px 10px; display:flex; flex-direction:column; gap:14px; overflow-y:auto;}
  .sidep .glabel{font-size:10px; text-transform:uppercase; letter-spacing:.4px; color:var(--muted); font-weight:700; margin-bottom:4px;}
  .sidep .col{display:flex; flex-direction:column; gap:5px;}
  .sidep .chip{border-radius:8px; text-align:left;}
</style>
</head>
<body>
  <h1>📊 Winrate Layout Lab — раскладка таблицы</h1>
  <p class="sub">Варианты расположения заголовка, фильтров (ранг/роль) и таблицы. Данные условные. Имена тут показал для наглядности (в боевом видны только иконки). Переключай сверху, выбери — перенесу.</p>

  <div class="switch" id="switch"></div>
  <p class="vdesc" id="vdesc"></p>
  <div class="screen" id="screen"></div>

<script>
(function(){
  var ROWS_DATA = [['Singed',53.60,1.92,0.26],['Vayne',52.88,2.53,20.8],['Sion',52.71,5.09,0.43],
    ['Teemo',52.32,4.93,19.3],['Olaf',52.30,1.56,0.33],['Renekton',52.06,7.78,2.12],
    ['Wukong',52.00,2.88,0.57],['Garen',50.87,22.0,7.96],['Jayce',50.82,2.78,0.58],['Gnar',50.74,2.68,0.20]];
  function wrCol(v){ return v>=52?'#2ecc71':v>=50?'#f1c40f':'#e74c3c'; }
  function ic(n){ return 'https://ddragon.leagueoflegends.com/cdn/14.24.1/img/champion/'+(n==='Wukong'?'MonkeyKing':n)+'.png'; }
  function rowsHTML(){
    var head = '<div class="thead"><span class="c-n">#</span><span class="c-c">Чемпион</span><span class="c-wr">WR</span><span class="c-pr">PR</span><span class="c-br">BR</span></div>';
    var rows = ROWS_DATA.map(function(d,i){
      return '<div class="wrow"><span class="c-n">'+(i+1)+'</span>'
        + '<span class="c-c"><img src="'+ic(d[0])+'" onerror="this.style.visibility=\'hidden\'"><span>'+d[0]+'</span></span>'
        + '<span class="c-wr" style="color:'+wrCol(d[1])+';">'+d[1].toFixed(2)+'%</span>'
        + '<span class="c-pr">'+d[2]+'%</span><span class="c-br">'+d[3]+'%</span></div>';
    }).join('');
    return head + rows;
  }
  function cardsHTML(){
    return '<div class="cards">' + ROWS_DATA.map(function(d,i){
      return '<div class="card"><div style="font-size:11px;color:rgba(255,255,255,.35);">#'+(i+1)+'</div>'
        + '<img src="'+ic(d[0])+'" onerror="this.style.visibility=\'hidden\'">'
        + '<div style="font-size:12px;font-weight:700;margin:4px 0;">'+d[0]+'</div>'
        + '<div style="font-size:17px;font-weight:900;color:'+wrCol(d[1])+';">'+d[1].toFixed(1)+'%</div>'
        + '<div style="font-size:11px;color:var(--muted);">PR '+d[2]+' · BR '+d[3]+'</div></div>';
    }).join('') + '</div>';
  }
  var RANKS = ['Мастер','ГМ','Чалик','Суверен'];
  var ROLES = ['Все','Top','Jgl','Mid','ADC','Sup'];
  function rankChips(active){ return RANKS.map(function(r,i){ return '<button class="chip'+(i===2?' on':'')+'">'+r+'</button>'; }).join(''); }
  function roleChips(){ return ROLES.map(function(r,i){ return '<button class="rchip'+(i===1?' on':'')+'">'+r+'</button>'; }).join(''); }

  var VARIANTS = {
    A: { name:'A — Текущая', desc:'Заголовок, ранг-фильтры по центру, роль-фильтры по центру, таблица. Как сейчас.',
      html:
        '<div class="hdr"><span style="font-size:17px;">📊</span><span class="t">WinRate &amp; PickRate</span><span class="upd">обновлено 06.06</span><button class="ic" style="margin-left:auto;">📷</button><button class="ic">⚙</button></div>'
        + '<div style="display:flex;justify-content:center;padding:10px 12px 6px;"><div class="chips">'+rankChips()+'</div></div>'
        + '<div style="display:flex;justify-content:center;padding:0 12px 10px;"><div class="chips">'+roleChips()+'</div></div>'
        + '<div class="tbl">'+rowsHTML()+'</div>' },

    B: { name:'B — Компактный тулбар', desc:'Заголовок + ранг + роль в одной полосе сверху (слева). Таблице больше места.',
      html:
        '<div class="hdr" style="flex-wrap:wrap;"><span style="font-size:16px;">📊</span><span class="t">WinRate</span>'
        +   '<div class="chips" style="margin-left:6px;">'+rankChips()+'</div>'
        +   '<div class="chips" style="margin-left:6px;">'+roleChips()+'</div>'
        +   '<button class="ic" style="margin-left:auto;">📷</button><button class="ic">⚙</button></div>'
        + '<div class="tbl">'+rowsHTML()+'</div>' },

    C: { name:'C — Фильтры сбоку', desc:'Слева панель ранг/роль, справа таблица на всю высоту. Фильтры всегда под рукой.',
      html:
        '<div class="hdr"><span style="font-size:17px;">📊</span><span class="t">WinRate &amp; PickRate</span><button class="ic" style="margin-left:auto;">📷</button><button class="ic">⚙</button></div>'
        + '<div class="sidewrap">'
        +   '<div class="sidep">'
        +     '<div><div class="glabel">Ранг</div><div class="col">'+RANKS.map(function(r,i){return '<button class="chip'+(i===2?' on':'')+'">'+r+'</button>';}).join('')+'</div></div>'
        +     '<div><div class="glabel">Роль</div><div class="col">'+ROLES.map(function(r,i){return '<button class="chip'+(i===1?' on':'')+'">'+r+'</button>';}).join('')+'</div></div>'
        +   '</div>'
        +   '<div class="tbl" style="flex:1;">'+rowsHTML()+'</div>'
        + '</div>' },

    D: { name:'D — Роли вкладками', desc:'Ранг — сегмент сверху, роли — крупные вкладки во всю ширину, под ними таблица.',
      html:
        '<div class="hdr"><span style="font-size:17px;">📊</span><span class="t">WinRate</span><div class="chips" style="margin-left:8px;">'+rankChips()+'</div><button class="ic" style="margin-left:auto;">📷</button><button class="ic">⚙</button></div>'
        + '<div style="display:flex;border-bottom:1px solid var(--line);">'+ROLES.map(function(r,i){return '<button style="flex:1;padding:10px;background:'+(i===1?'rgba(11,196,227,.12)':'none')+';border:none;border-bottom:2px solid '+(i===1?'var(--accent)':'transparent')+';color:'+(i===1?'var(--accent)':'rgba(255,255,255,.6)')+';font-size:13px;font-weight:700;cursor:pointer;">'+r+'</button>';}).join('')+'</div>'
        + '<div class="tbl">'+rowsHTML()+'</div>' },

    E: { name:'E — Карточки-сетка', desc:'Чемпы карточками в сетку: крупный WR, иконка, PR/BR мелким. Визуально, как витрина.',
      html:
        '<div class="hdr"><span style="font-size:17px;">📊</span><span class="t">WinRate &amp; PickRate</span><button class="ic" style="margin-left:auto;">📷</button><button class="ic">⚙</button></div>'
        + '<div style="display:flex;justify-content:center;padding:10px 12px 4px;"><div class="chips">'+rankChips()+'</div></div>'
        + '<div style="display:flex;justify-content:center;padding:0 12px 6px;"><div class="chips">'+roleChips()+'</div></div>'
        + '<div class="tbl" style="padding:0;">'+cardsHTML()+'</div>' },

    F: { name:'F — Плотные строки (компакт)', desc:'Те же строки, но плотнее и мельче иконки — больше чемпов на экране без скролла.',
      html:
        '<div class="hdr" style="flex-wrap:wrap;"><span style="font-size:16px;">📊</span><span class="t">WinRate</span>'
        +   '<div class="chips" style="margin-left:6px;">'+rankChips()+'</div><div class="chips" style="margin-left:6px;">'+roleChips()+'</div>'
        +   '<button class="ic" style="margin-left:auto;">📷</button><button class="ic">⚙</button></div>'
        + '<div class="tbl dense">'+rowsHTML()+'</div>' }
  };

  var order = ['A','B','C','D','E','F'];
  var sw = document.getElementById('switch'), screen = document.getElementById('screen'), vdesc = document.getElementById('vdesc');
  function show(id){
    Array.prototype.forEach.call(sw.children, function(b){ b.classList.toggle('on', b.dataset.v===id); });
    screen.innerHTML = VARIANTS[id].html; vdesc.innerHTML = '<b>'+VARIANTS[id].name+'</b> — '+VARIANTS[id].desc;
  }
  order.forEach(function(id){ var b=document.createElement('button'); b.dataset.v=id; b.textContent=id; b.title=VARIANTS[id].name; b.onclick=function(){show(id);}; sw.appendChild(b); });
  show('A');
})();
</script>
</body>
</html>
