name: Regenerate SEO pages

# Перегенерирует статические SEO-страницы (чемпионы, предметы, руны, тир-лист)
# из свежих данных Firestore + Google-таблицы и коммитит изменения.
# Запускается раз в неделю и вручную (кнопкой Run workflow).
# Данные читаются публично, секреты не нужны.

on:
  schedule:
    - cron: '17 4 * * 1'   # каждый понедельник 04:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate SEO pages
        run: node seo/generate.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add champions items runes tier-list drafter damage-calculator map-strategy coaching sitemap.xml
          if git diff --cached --quiet; then
            echo "Нет изменений в SEO-страницах."
          else
            git commit -m "chore(seo): regenerate static pages [skip ci]"
            git push
          fi
