<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Превью · меню «Мой профиль» на боевом styles.css</title>
  <!-- грузим РЕАЛЬНЫЙ боевой CSS, чтобы видеть ровно то, что на сайте -->
  <link rel="stylesheet" href="../styles.css">
  <style>
    body {
      margin: 0; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(180,140,255,0.10), transparent 55%),
        linear-gradient(160deg, #010d18 0%, #010A13 60%, #000 100%);
      font-family: -apple-system, "Segoe UI", Roboto, system-ui, sans-serif;
      color: #fff; padding: 40px 16px;
    }
    .pv-note {
      max-width: 460px; text-align: center; font-size: 13px; line-height: 1.6;
      color: rgba(255,255,255,0.6);
    }
    .pv-note b { color: #B48CFF; }
    /* показываем меню всегда (на сайте оно открывается по клику) */
    .pv-host { position: relative; height: 440px; width: 240px; }
    .pv-host .user-menu { display: block; position: static; }
  </style>
</head>
<body>

  <p class="pv-note">
    Это <b>боевой</b> результат из <b>styles.css</b> — наводи мышкой на строки меню.<br>
    Так оно будет выглядеть на сайте в кнопке профиля.
  </p>

  <div class="pv-host">
    <!-- разметка 1-в-1 из index.html -->
    <div class="user-menu">
      <div class="user-menu-email">erjansatyndiev@gmail.com</div>
      <button class="user-menu-item">👤 Мой профиль</button>
      <button class="user-menu-item">🔄 Синхронизировать</button>
      <button class="user-menu-item">📋 История изменений</button>
      <button class="user-menu-item">⚙ Настройки лейаута</button>
      <button class="user-menu-item">🎚 Редактор позиций</button>
      <button class="user-menu-item">🧹 Очистить все патч-ноты</button>
      <button class="user-menu-item">🖼 Иконки</button>
      <button class="user-menu-item">🔤 Сайдбар</button>
      <button class="user-menu-item">🔤 Шрифты сайта</button>
      <button class="user-menu-item">🚪 Выйти</button>
    </div>
  </div>

</body>
</html>
