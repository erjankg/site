<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .card {
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #0a0614 0%, #12082a 50%, #0d1a2e 100%);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif;
  }

  /* Фоновые декоративные круги */
  .card::before {
    content: '';
    position: absolute;
    width: 700px;
    height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(109,63,245,0.15) 0%, transparent 70%);
    top: -200px;
    left: -100px;
    pointer-events: none;
  }
  .card::after {
    content: '';
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(52,152,219,0.12) 0%, transparent 70%);
    bottom: -150px;
    right: -50px;
    pointer-events: none;
  }

  /* Тонкая линия сверху */
  .top-line {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, #6D3FF5, #3498db, transparent);
  }

  /* Лого */
  .logo {
    font-size: 72px;
    margin-bottom: 20px;
    filter: drop-shadow(0 0 20px rgba(109,63,245,0.6));
    position: relative;
    z-index: 1;
  }

  /* Название */
  .title {
    font-size: 64px;
    font-weight: 900;
    color: #fff;
    letter-spacing: -1px;
    position: relative;
    z-index: 1;
    text-shadow: 0 0 40px rgba(109,63,245,0.4);
  }
  .title span {
    background: linear-gradient(90deg, #a78bfa, #6D3FF5, #3498db);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Слоган */
  .slogan {
    margin-top: 22px;
    display: flex;
    gap: 0;
    align-items: center;
    position: relative;
    z-index: 1;
  }
  .slogan-item {
    font-size: 22px;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.5px;
  }
  .slogan-dot {
    font-size: 22px;
    color: #6D3FF5;
    margin: 0 10px;
    font-weight: 900;
  }

  /* Домен */
  .domain {
    position: absolute;
    bottom: 32px;
    font-size: 18px;
    font-weight: 700;
    color: rgba(255,255,255,0.3);
    letter-spacing: 2px;
    text-transform: uppercase;
    z-index: 1;
  }
  .domain span {
    color: rgba(109,63,245,0.7);
  }

  /* Угловые акценты */
  .corner {
    position: absolute;
    width: 60px;
    height: 60px;
    z-index: 1;
  }
  .corner.tl { top: 20px; left: 20px; border-top: 2px solid rgba(109,63,245,0.4); border-left: 2px solid rgba(109,63,245,0.4); }
  .corner.tr { top: 20px; right: 20px; border-top: 2px solid rgba(109,63,245,0.4); border-right: 2px solid rgba(109,63,245,0.4); }
  .corner.bl { bottom: 20px; left: 20px; border-bottom: 2px solid rgba(109,63,245,0.4); border-left: 2px solid rgba(109,63,245,0.4); }
  .corner.br { bottom: 20px; right: 20px; border-bottom: 2px solid rgba(109,63,245,0.4); border-right: 2px solid rgba(109,63,245,0.4); }
</style>
</head>
<body>
  <div class="card">
    <div class="top-line"></div>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <div class="logo">⚔️</div>
    <div class="title">Wild Rift <span>Stats</span></div>
    <div class="slogan">
      <span class="slogan-item">Статы</span>
      <span class="slogan-dot">·</span>
      <span class="slogan-item">Предметы</span>
      <span class="slogan-dot">·</span>
      <span class="slogan-item">Винрейт</span>
      <span class="slogan-dot">·</span>
      <span class="slogan-item">Драфт</span>
    </div>
    <div class="domain">pro-wildrift<span>.com</span></div>
  </div>
</body>
</html>
