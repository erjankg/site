<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Песочница — Мой профиль</title>
<link rel="preconnect" href="https://ddragon.leagueoflegends.com">
<link rel="stylesheet" href="profile-lab.css?v=2">
</head>
<body>
  <header class="lab-top">
    <div class="lab-top-title">
      <span class="lab-logo">👤</span>
      <div>
        <div class="lab-h1">Мой профиль — песочница</div>
        <div class="lab-sub">Слева редактор, справа живая карточка (как тебя видят другие). Аватар = сплэш любимого чемпа, он же фон за стеклом. Боевой сайт не трогается.</div>
      </div>
    </div>
    <div id="labTools"></div>
    <button id="resetBtn" class="lab-reset">↺ Сбросить</button>
  </header>

  <nav id="variantBar" class="variant-bar"></nav>

  <main id="labMain" class="lab-main">
    <section class="editor glassy" id="editor"></section>
    <section class="preview-wrap" id="previewWrap">
      <div class="preview-card glassy" id="previewCard"></div>
    </section>
  </main>

  <!-- Пикер чемпионов (стекло) -->
  <div id="champPicker" class="cp-mask" hidden>
    <div class="cp-win glassy">
      <div class="cp-head">
        <span id="cpTitle" class="cp-title">Выбрать чемпиона</span>
        <button id="cpClose" class="cp-close">✕</button>
      </div>
      <input id="cpSearch" class="cp-search" type="text" placeholder="Поиск чемпиона…" autocomplete="off">
      <div id="cpGrid" class="cp-grid"></div>
      <div class="cp-foot">
        <span id="cpHint" class="cp-hint"></span>
        <button id="cpDone" class="cp-done">Готово</button>
      </div>
    </div>
  </div>

  <script src="../lab-settings.js?v=3"></script>
  <script src="profile-lab.js?v=2"></script>
</body>
</html>
