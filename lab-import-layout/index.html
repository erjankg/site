<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Import Layout Lab — варианты раскладки модалки импорта</title>
<style>
  :root{ --bg:#0a0f16; --panel:#0d1b2a; --line:rgba(255,255,255,.1); --accent:#0bc4e3; --accent2:#2ecc71;
         --text:#e8eef4; --muted:rgba(255,255,255,.55); }
  *{box-sizing:border-box;}
  body{ margin:0; background:radial-gradient(1000px 500px at 70% -10%,#112436,var(--bg) 60%);
        color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; padding:22px; }
  h1{margin:0 0 6px; font-size:21px;}
  .sub{color:var(--muted); font-size:13px; margin:0 0 16px; max-width:820px; line-height:1.6;}
  .switch{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px;}
  .switch button{background:rgba(255,255,255,.05); border:1px solid var(--line); color:rgba(255,255,255,.85);
    font-size:13px; font-weight:700; padding:8px 14px; border-radius:10px; cursor:pointer;}
  .switch button.on{background:rgba(11,196,227,.16); border-color:rgba(11,196,227,.6); color:var(--accent);}
  .vdesc{color:var(--muted); font-size:12.5px; margin:0 0 12px; min-height:18px;}
  .vdesc b{color:var(--accent2);}

  /* «экран» — имитация полноэкранной модалки */
  .screen{ height:78vh; min-height:520px; border:1px solid var(--line); border-radius:14px; overflow:hidden;
           background:linear-gradient(180deg,var(--panel),#0b1622); box-shadow:0 20px 60px rgba(0,0,0,.5); display:flex; flex-direction:column;}

  /* строительные блоки */
  .m-head{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:14px 18px; border-bottom:1px solid var(--line);}
  .m-head h3{margin:0; font-size:16px;}
  .m-head .x{background:none; border:none; color:#fff; font-size:20px; cursor:pointer;}
  .help{background:rgba(11,196,227,.08); border:1px solid rgba(11,196,227,.25); border-radius:10px;
        padding:9px 11px; color:var(--muted); font-size:11.5px; line-height:1.5;}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .fld label{display:block; font-size:10px; text-transform:uppercase; letter-spacing:.4px; color:var(--muted); font-weight:700; margin-bottom:4px;}
  .inp{width:100%; padding:8px 10px; background:#14202e; border:1px solid var(--line); border-radius:8px; color:#fff; font-size:13px;}
  .order{display:flex; gap:8px; flex-wrap:wrap; font-size:12px; color:rgba(255,255,255,.8);}
  .order label{display:flex; align-items:center; gap:5px; cursor:pointer;}
  textarea.inp{min-height:90px; font-family:Consolas,monospace; font-size:12px; resize:vertical;}
  .btns{display:flex; gap:10px;}
  .b{flex:1; padding:10px 14px; border-radius:10px; font-size:13px; font-weight:800; cursor:pointer; border:1.5px solid;}
  .b-parse{background:rgba(241,196,15,.18); color:#f1c40f; border-color:rgba(241,196,15,.4);}
  .b-save{background:rgba(11,196,227,.15); color:var(--accent); border-color:rgba(11,196,227,.5);}
  .b-cancel{background:rgba(255,255,255,.05); color:var(--muted); border-color:var(--line); flex:0 0 auto;}

  /* список распарсенного */
  .list-wrap{display:flex; flex-direction:column; min-height:0;}
  .list-head{font-size:10px; text-transform:uppercase; letter-spacing:.4px; color:var(--muted); font-weight:700; padding:0 8px 6px;}
  .rows{display:flex; flex-direction:column; gap:6px; overflow-y:auto; padding-right:4px;}
  .rw{display:flex; align-items:center; gap:8px; padding:6px 8px; border-radius:10px; border:1px solid; }
  .rw.ok{border-color:rgba(46,204,113,.45); background:rgba(46,204,113,.05);}
  .rw.no{border-color:rgba(231,76,60,.55); background:rgba(231,76,60,.06);}
  .rw .grip{width:16px; text-align:center; color:rgba(255,255,255,.35); cursor:grab; letter-spacing:-2px;}
  .rw .n{width:22px; text-align:center; color:rgba(255,255,255,.4); font-size:11px;}
  .rw .wr{width:54px; text-align:center; color:var(--accent); font-weight:700; font-size:12px;}
  .rw .pr,.rw .br{width:48px; text-align:center; color:rgba(255,255,255,.6); font-size:12px;}
  .rw .pick{flex:1; min-width:0; display:flex; align-items:center; gap:6px; padding:5px 8px; border-radius:8px;
            border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.04); font-size:12.5px; font-weight:700;}
  .rw .pick.empty{color:rgba(231,76,60,.95);}
  .rw .pick img{width:22px; height:22px; border-radius:5px; background:linear-gradient(135deg,#1c3350,#0c1a2a);}

  .col{display:flex; flex-direction:column; gap:12px; min-height:0;}
  .scrollarea{overflow-y:auto; min-height:0;}
  .sticky-bar{border-top:1px solid var(--line); padding:12px 18px; background:rgba(8,14,22,.85); backdrop-filter:blur(6px);}
  .note{font-size:11px; color:var(--muted);}
</style>
</head>
<body>
  <h1>🧩 Import Layout Lab — раскладка модалки импорта</h1>
  <p class="sub">Четыре варианта расположения управления и кнопок. Контент условный (для примера). Переключай сверху и смотри. Выбери — перенесу в боевую модалку импорта.</p>

  <div class="switch" id="switch"></div>
  <p class="vdesc" id="vdesc"></p>
  <div class="screen" id="screen"></div>

<script>
(function(){
  var champ = function(name){ return '<img src="https://ddragon.leagueoflegends.com/cdn/14.24.1/img/champion/'+name+'.png" onerror="this.style.visibility=\'hidden\'"><span>'+name+'</span>'; };

  // блоки
  var HELP = '<div class="help">1. На lolm.qq.com выдели таблицу, Ctrl+C (имена не важны — берём только числа). 2. Выбери ранг и роль, вставь. 3. «Распарсить» → напротив строк выбери чемпов. 4. «Сохранить».</div>';
  var SELECTS = '<div class="row2">'
    + '<div class="fld"><label>Ранг</label><select class="inp"><option>чалик</option><option>алмаз</option></select></div>'
    + '<div class="fld"><label>Роль</label><select class="inp"><option>top</option><option>jungle</option></select></div></div>';
  var ORDER = '<div class="fld"><label>Порядок чисел</label><div class="order"><label><input type="radio" name="o" checked> WR→PR→BR</label><label><input type="radio" name="o"> WR→BR→PR</label><label><input type="radio" name="o"> Только WR</label></div></div>';
  var TA = '<div class="fld"><label>Вставь таблицу</label><textarea class="inp" placeholder="Ctrl+V…"></textarea></div>';
  function BTNS(){ return '<div class="btns"><button class="b b-parse">🔍 Распарсить</button><button class="b b-save">💾 Сохранить</button><button class="b b-cancel">Отмена</button></div>'; }

  var ROWS = (function(){
    var data = [['53.05','2.96','0.49','Singed'],['52.82','4.91','0.56','Teemo'],['52.54','4.21','10.5',''],
                ['51.98','1.37','6.83','Ryze'],['51.71','2.62','0.14',''],['51.54','5.24','4.09','Ambessa'],
                ['51.21','17.8','10.0','Garen'],['50.87','2.39','0.42',''],['50.45','4.56','1.54','Sett']];
    return data.map(function(d,i){
      var ok = !!d[3];
      var pick = ok ? '<div class="pick">'+champ(d[3])+'</div>' : '<div class="pick empty">▾ выбери чемпиона</div>';
      return '<div class="rw '+(ok?'ok':'no')+'"><span class="grip">⋮⋮</span><span class="n">'+(i+1)+'</span>'
        + '<span class="wr">'+d[0]+'%</span><span class="pr">'+d[1]+'%</span><span class="br">'+d[2]+'%</span>'+pick+'</div>';
    }).join('');
  })();
  var LIST = '<div class="list-wrap" style="flex:1;"><div class="list-head"># · WR · PR · BR · чемпион (тащи за ⋮⋮)</div><div class="rows">'+ROWS+'</div></div>';

  // ── ВАРИАНТЫ РАСКЛАДКИ ──
  var VARIANTS = {
    A: { name:'A — Текущая (кнопки внизу левой колонки)',
      desc:'Как сейчас: слева управление + кнопки (уезжают со скроллом), справа список.',
      html:
        '<div class="m-head"><h3>📥 Импорт винрейтов</h3><button class="x">✕</button></div>'
        + '<div style="flex:1; display:flex; min-height:0;">'
        +   '<div class="col scrollarea" style="width:42%; padding:16px; border-right:1px solid var(--line);">'
        +     HELP + SELECTS + ORDER + TA + BTNS()
        +   '</div>'
        +   '<div class="col" style="flex:1; padding:16px; min-height:0;">'+LIST+'</div>'
        + '</div>' },

    B: { name:'B — Липкая нижняя панель кнопок',
      desc:'Кнопки в отдельной полосе внизу на всю ширину — всегда на виду, не уезжают.',
      html:
        '<div class="m-head"><h3>📥 Импорт винрейтов</h3><button class="x">✕</button></div>'
        + '<div style="flex:1; display:flex; min-height:0;">'
        +   '<div class="col scrollarea" style="width:42%; padding:16px; border-right:1px solid var(--line);">'+HELP+SELECTS+ORDER+TA+'</div>'
        +   '<div class="col" style="flex:1; padding:16px; min-height:0;">'+LIST+'</div>'
        + '</div>'
        + '<div class="sticky-bar">'+BTNS()+'</div>' },

    C: { name:'C — Кнопки в шапке',
      desc:'Действия (Распарсить/Сохранить) — справа в шапке. Управление и список — ниже.',
      html:
        '<div class="m-head"><h3>📥 Импорт винрейтов</h3>'
        +   '<div style="display:flex; gap:8px; align-items:center;"><button class="b b-parse" style="flex:0 0 auto;">🔍 Распарсить</button><button class="b b-save" style="flex:0 0 auto;">💾 Сохранить</button><button class="x">✕</button></div></div>'
        + '<div style="flex:1; display:flex; min-height:0;">'
        +   '<div class="col scrollarea" style="width:42%; padding:16px; border-right:1px solid var(--line);">'+HELP+SELECTS+ORDER+TA+'</div>'
        +   '<div class="col" style="flex:1; padding:16px; min-height:0;">'+LIST+'</div>'
        + '</div>' },

    D: { name:'D — Узкая левая, список доминирует',
      desc:'Левая колонка компактная (инструкция свёрнута), список занимает максимум. Кнопки — липкие внизу левой колонки.',
      html:
        '<div class="m-head"><h3>📥 Импорт винрейтов</h3><button class="x">✕</button></div>'
        + '<div style="flex:1; display:flex; min-height:0;">'
        +   '<div style="width:320px; display:flex; flex-direction:column; min-height:0; border-right:1px solid var(--line);">'
        +     '<div class="scrollarea" style="padding:16px; display:flex; flex-direction:column; gap:12px;">'
        +       '<div class="note">ℹ️ Инструкция свёрнута — наведи для подсказки. Имена не важны, берём числа.</div>'
        +       SELECTS + ORDER + TA
        +     '</div>'
        +     '<div class="sticky-bar" style="margin-top:auto;">'+BTNS()+'</div>'
        +   '</div>'
        +   '<div class="col" style="flex:1; padding:16px; min-height:0;">'+LIST+'</div>'
        + '</div>' }
  };

  var order = ['A','B','C','D'];
  var sw = document.getElementById('switch');
  var screen = document.getElementById('screen');
  var vdesc = document.getElementById('vdesc');

  function show(id){
    Array.prototype.forEach.call(sw.children, function(b){ b.classList.toggle('on', b.dataset.v===id); });
    screen.innerHTML = VARIANTS[id].html;
    vdesc.innerHTML = '<b>'+VARIANTS[id].name+'</b> — '+VARIANTS[id].desc;
  }
  order.forEach(function(id){
    var b = document.createElement('button'); b.dataset.v=id; b.textContent=VARIANTS[id].name.split(' ')[0];
    b.title = VARIANTS[id].name;
    b.onclick = function(){ show(id); };
    sw.appendChild(b);
  });
  show('A');
})();
</script>
</body>
</html>
